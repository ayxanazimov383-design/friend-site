<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Файлы Джамиля</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 30px;
        }

        .profile {
            text-align: center;
            background: rgba(255,255,255,0.12);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .profile img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid white;
        }

        h1 {
            font-size: 42px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .card {
            background: rgba(255,255,255,0.14);
            padding: 20px;
            border-radius: 18px;
            text-align: center;
        }

        .video-box {
            margin-top: 30px;
            background: rgba(255,255,255,0.12);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
        }

        video {
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
        }

        button {
            margin-top: 20px;
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            background: #facc15;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">

    <div class="profile">
        <img src="friend.jpg.jpg" alt="Фото Джамиля">

        <h1>Файлы Джамиля</h1>
        <p>Краткое описание: чмо, йекя баш</p>

        <button onclick="showMessage()">Показать факт</button>
        <p id="result"></p>
    </div>

    <div class="cards">
        <div class="card">
            <h2>Хобби</h2>
            <p>дрочить</p>
        </div>

        <div class="card">
            <h2> Качества</h2>
            <p>сексуальный</p>
        </div>

        <div class="card">
            <h2> Достижения</h2>
            <p>дрочил 5 раз в день</p>
        </div>
    </div>

    <div class="video-box">
        <h2>🎬 Видео</h2>

        <video width="700" controls>
    <source src="video.mp4.mp4" type="video/mp4">
</video>
    </div>

</div>

<script>
    function showMessage() {
        document.getElementById("result").innerHTML =
        "Он долбоеб";
    }
</script>

</body>
</html>
</html>
</body>
</html>
</html>
